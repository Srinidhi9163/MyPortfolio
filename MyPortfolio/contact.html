<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function validateForm() {
            let phone = document.getElementById('phone').value;
            if (phone.length != 10) { alert('Enter valid phone number'); return false; }
            return true;
        }
    </script>
</head>

<body>
    <div class="container mt-5">
        <h3>Contact Me</h3>
        <form onsubmit="return validateForm()">
            <input class="form-control mb-2" placeholder="Name" required>
            <input type="email" class="form-control mb-2" placeholder="Email" required>
            <input id="phone" class="form-control mb-2" placeholder="Phone" required>
            <textarea class="form-control mb-2" placeholder="Message" required></textarea>
            <button class="btn btn-success">Submit</button>
        </form>
    </div>
</body>

</html>
